{% extends 'base.html' %} 



 
{% block content %} 
<div class='card shadow-sm'> 
    <div class='card-body'> 
        <h2 class='card-title mb-4'>Reporte interno</h2> 
        <p class='text-muted'> 
            Esta vista solo puede ser visualizada por usuarios del grupo <strong>Encargados</strong> 
            que además tengan el permiso correspondiente. 
        </p> 
 
        <div class='row g-3'> 
            <div class='col-md-4'> 
                <div class='card text-center border-primary'> 
                    <div class='card-body'> 
                        <h5>Total de notebooks</h5> 
                        <p class='display-6'>{{ total }}</p> 
                    </div> 
                </div> 
            </div> 
 
            <div class='col-md-4'> 
                <div class='card text-center border-success'> 
                    <div class='card-body'> 
                        <h5>Disponibles</h5> 
                        <p class='display-6'>{{ disponibles }}</p> 
                    </div> 
                </div> 
            </div> 
 
            <div class='col-md-4'> 
                <div class='card text-center border-warning'> 
                    <div class='card-body'> 
                        <h5>En mantención</h5> 
                        <p class='display-6'>{{ mantencion }}</p> 
                    </div> 
                </div> 
            </div> 
        </div> 
    </div> 
</div> 
{% endblock %}
