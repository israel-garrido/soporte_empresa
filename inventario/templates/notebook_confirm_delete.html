{% extends 'base.html' %} 
 
{% block content %} 
<div class='row justify-content-center'> 
    <div class='col-md-8 col-lg-6'> 
        <div class='card shadow-sm border-danger'> 
            <div class='card-body'> 
                <h2 class='card-title text-danger mb-3'>Eliminar notebook</h2> 
 
                <p>¿Seguro que deseas eliminar el notebook <strong>{{ object }}</strong>?</p> 
 
                <form method='post'>
                    {% csrf_token %} 
                    <button type='submit' class='btn btn-danger'>Sí, eliminar</button> 
                    <a href='{% url "notebook_list" %}' class='btn btn-secondary'>Cancelar</a> 
                </form> 
            </div> 
        </div> 
    </div> 
</div> 
{% endblock %}
