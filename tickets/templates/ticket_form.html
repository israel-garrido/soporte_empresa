{% extends "base.html" %} 
 
{% block content %} 
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0"> 
            <div class="card-body p-4"> 
                <h2 class="card-title h4 mb-4 text-secondary"> 
                    {% if object %}
                        <i class="bi bi-pencil-square"></i> Editar ticket #{{ object.id }}
                    {% else %}
                        <i class="bi bi-ticket-detailed"></i> Nuevo ticket
                    {% endif%} 
                </h2> 
            
                <form method="post"> 
                    {% csrf_token %} 
                    
                    <div class="mb-4">
                        {{ form.as_p }} 
                    </div>
            
                    <div class="d-flex gap-2"> 
                        <button class="btn btn-success" type="submit"> 
                            <i class="bi bi-check-circle"></i> {% if object %}Guardar cambios{% else %}Crear ticket{% endif %} 
                        </button> 
                        <a class="btn btn-outline-secondary" href="{% url 'ticket_list' %}">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a> 
                    </div> 
                </form> 
            </div> 
        </div>
    </div>
</div>
{% endblock %}
