{% extends 'base.html' %} 
{% block content %} 


<div class="row justify-content-center mt-5"> 
    <div class="col-md-6 col-lg-4"> 
        <div class="card shadow-sm border-0"> 
            <div class="card-body p-4"> 
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle display-4 text-primary"></i>
                    <h2 class="card-title h3 mt-2 text-secondary">Iniciar sesión</h2> 
                </div>
 
                <form method="post" class="django-form"> 
                    {% csrf_token %} 
 
                    <div class="mb-3 text-start"> 
                        <label for="{{ form.username.id_for_label }}" class="form-label text-muted fw-bold">Usuario</label> 
                        {{ form.username }} 
                    </div> 
 
                    <div class="mb-4 text-start"> 
                        <label for="{{ form.password.id_for_label }}" class="form-label text-muted fw-bold">Contraseña</label> 
                        {{ form.password }} 
                    </div> 
 
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button> 
                </form> 
            </div> 
        </div> 
    </div> 
</div> 
{% endblock %}
